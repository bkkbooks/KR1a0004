body:
  text: 增補鄭氏周易卷上宋王應麟輯長洲惠棟考補周易上經乾九二見龍在田利見大人二于三才為地道地上即田故稱田也集解九二利見九五之大人正義九三君子終日乾乾夕惕若厲無咎三于三才為人道有乾德而在人道君子之象集解惕懼也釋文九五飛龍在天利見大人五于三才為天道天者清明無形而龍在焉飛之象集解上九亢龍有悔堯之末年四凶在朝是以有悔未大凶也正義用九見羣龍無首吉六爻皆體乾一作龍羣龍之象也舜既受道道一作禪禹與稷契咎繇之屬並在于朝後漢郎顗傳注班固傳注萬物資始乃統天資取也統本也釋文大人造也造徂早反造為也釋文文言傳附君子體仁足以長人體生也文選二十四不成名釋文當隱之時以從世俗不自殊異無所成名也集解確乎其不可拔確堅髙之貌拔移也釋文間邪以存其誠會通朝氏云君子進德修業及時故無咎同上聖人作作起也釋文亢龍有悔窮志災也同上利貞者情性也漢上易朝氏同乾始而以美利利天下朝氏云坤履霜堅氷至履讀為禮釋文馴致其道馴從也釋文六二直方直也方也地之性此爻得中氣而在地上自然之性廣生萬物故生動直而且方禮記深衣正義龍戰于野聖人喻龍君子喻蛇儀禮注蛇龍君子之類必有餘殃殃禍惡也釋文為其慊于陽也釋文謂鄭作謙訛故稱龍焉慊讀如羣公溓之溓古書篆作立心與水相近讀者失之故作慊溓雜也陰謂此上六也陽謂今消息用事乾也上六為蛇得乾氣雜似龍詩采薇正義屯天造草昧宜建侯而不寧造成也草草創昧昧爽也文選注三十六而讀曰能能猶安也釋文君子以經論謂論撰書禮樂施政事釋文以正義曰劉表鄭玄綸為論字六二乘馬般如馬牝牡曰乘釋文匪冦昏冓冓猶會也釋文君子機不如舍機弩牙也釋文以從禽也從于用反釋文蒙蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告蒙者蒙蒙物初生形是其未開著之名也人幼稚曰童未冠之稱亨者陽也瀆褻也筮問也㸦體震而得中嘉會禮通陽自動其中德施地道之上萬物應之而萌牙生教授之師取象焉修道藝于其室而童蒙者求為之弟子非已乎求之也弟子初問則告之以事義不思其三隅相況以反解而筮者此勤師而功寡學者之災也瀆筮則不復告欲令思而得之亦所以利義而幹事也公羊疏釋文初六用説桎梏木在足曰桎在手曰梏周禮大司冦疏九二苞蒙苞當作彪彪文也釋文順以巽也巽當作遜釋文上九繫蒙釋文需需讀為秀陽氣秀而不直上者畏上坎也釋文光亨貞吉釋文云鄭揔為一句位音涖乎天位釋文君子以飲食宴樂宴享宴也釋文九二需于􅫤釋文􅫤接水者詩鳧鷖正義引作沙致戎至釋文訟辨財曰訟釋文有孚嘻嘻覺悔貌釋文九二歸而逋其邑人三百户無眚小國之下大夫采地方一成其定稅三百家故三百户也雜記正義不易之田嵗種之一易之田休一嵗乃種再易之田休二嵗乃種言至薄也茍自藏隱不敢與五相敵則無災眚正義眚過也釋文患至惙也惙陟劣反惙憂也釋文渝安貞吉渝然也釋文上九或錫之鞶帶鞶帶佩鞶之帶周禮巾車疏終朝三拖之拖徒可反釋文師軍二千五百人為師多以軍為名次以師為名少以旅為名師者舉中之言王氏丈人吉丈之言長能御衆有正人之德以法度為人之長吉而無咎謂天子諸侯主軍者春官天府疏釋文初六否臧凶否方有反釋文九二王三賜命釋文承天寵也寵光耀也釋文比初六有孚盈缶爻辰在未上值東井井之水人所汲用缶缶汲器也詩宛丘正義釋文九五王用三驅釋文失前禽王因天下顯習兵于搜狩焉驅禽而射之三則已法一作發軍禮也失前禽者謂禽在前來者不逆而射之傍去又不射唯背走者順而射之不中則一作亦巳是皆所以失之用兵之法亦如之降者不殺奔者不禁背者不殺加以仁恩養威之道秋官士師疏義左傳桓四年正小畜許六反釋文畜養也釋文九三輿説輻輻伏莬釋文謂輿下縳木與軸相連鈎心之木是也王氏履履虎尾不噬人亨噬齧也音誓十文選視履考詳履道之終考正詳備朝氏泰通也釋文后以財成天地之道輔相天地之宜以左右民財節也輔相左右助也以者取其順陰陽之節為出內之政春崇寬仁夏以長養秋教收斂冬敕蓋藏皆可以成物助民也集解初九拔茅音苖茹以其彚征彚音謂彚類也茹牽引也茅喻君有潔白之德臣下引其類而仕之劉向傳注九二苞荒荒讀為康虛也釋文六五帝乙歸妹以祉元吉五爻辰在卯春為陽中萬物以生生育者嫁娶之貴仲春之月嫁娶男女之禮福祿大吉周禮媒氏疏上六城復于隍隍壑也詩韓奕正義否九四􅔧離祉釋文九五休否休美也文選二十五其亡其亡繫于苞桑苞植也否世之人不知聖人有命咸曰其將亡矣其將亡矣而聖乃自繫于植桑不亡也文選五十二猶紂囚文王於羑里之獄四臣獻珍異之物而終免于難繫于苞桑之謂集解同人同人于野亨乾為天離為火卦體有巽巽為風天在上火炎上而從之是其性同于天也火得風然後炎上益熾是猶人君在上施政教使天下之人和同而事之以是為人和同者君之所為也故謂之同人風行無所不遍遍則會通之德大行故曰同人于野亨集解六二同人于宗天子諸侯后夫人無子不出儀禮士昏禮疏詩河廣正義九三伏戎于莽莽叢木也釋文九四乘其庸釋文大有大有元亨六五體離處乾之上猶大臣有聖明之德代君為政處其位有其事而理之也元亨者又能長羣臣以善使嘉會禮通若周公攝政朝諸侯于明堂是也集解明辨遰也遰讀如明星晢晢釋文嗛嗛亨君子有終艮為山坤為地山體髙今在地下其於人道髙能下下嗛之象亨者嘉會之禮以嗛為主嗛者自貶損以下人唯艮之堅固坤之厚順乃能終之故君子之人有終也集解君子以捊多益寡捊取也釋文卑以自牧也牧養也釋文十文選注六六四撝嗛撝讀為宣釋文豫豫利建侯行師坤順也震動也順其性而動者莫不得其所故謂之豫豫喜佚説樂之貌也震又為雷諸侯之象坤又為衆師役之象故利建侯行師矣集解四時不忒忒差也釋文象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考奮動也雷動於地上萬物乃豫也以者取其喜佚動搖猶人至樂則手欲鼓之足欲舞之也崇充也殷盛也薦進也上帝天帝也王者功成作樂以文得之者作籥舞以武得之者作萬舞各充其德而為制祀天地以配祖考者使與天同饗其功也故孝經云郊祀后稷以配天宗祀文王於明堂以配上帝是也集解六二砎于石砎古八切謂磨砎也釋文六三盱豫盱誇也釋文九四由豫大有得勿疑朋盍簮由用也簮速也釋文上六冥豫冥讀為鳴釋文隨隨元亨利貞無咎震動也兌説也內動之以德外説之以言則天下之民咸慕其行而隨從之故謂之隨也既見隨從能長之以善通其嘉禮和之以義幹之以正則功成而有福若無此四德則有凶咎焉焦貢曰漢髙帝與項籍其明徵也集解年左傳襄九正義君子以嚮晦入宴息晦宴也猶人君既夕之後入于宴寢而止息正義出門交有功震為大塗又為日門當春分陰陽之所交也是臣出君門與四方賢人交有成功之象也昔舜慎徽五典五典克從內于百揆百揆時序賔于四門四門穆穆是其義也集解蠱先甲三日後甲三日甲者造作新令之日先之三日而用辛也欲取改過自新之義後之三日而用丁也取其丁寧之義正義臨至于八月有凶臨大也陽氣自此浸而長大陽浸長矣而有四德齊功於乾盛之極也人之情盛則奢淫奢淫將亡故戒以凶也臨卦斗建丑而用事殷之正月也當文王之時紂為無道故于是卦為殷家著興衰之戒以見周改殷正之數云臨自周二月用事訖其七月至八月而􅋟卦受之此終而復始王命然矣集解觀觀盥而不薦坤為地為衆巽為木為風九五天子之爻㸦體有艮艮為鬼門又為宫闕地上有木而為鬼門宫闕者天子宗廟之象也集解諸侯貢士於天子卿大夫貢士於其君必以禮賔之唯主人盥而獻賔賔盥而酢主人設薦俎則弟子也王氏初六童觀童稚也釋文噬嗑先王以明罰敕法敕猶理也釋文九四噬乾胏胏簀釋文上九何校滅耳凶離為稿木坎為耳木在耳上何校滅耳之象也集解聰不明也目不明耳不聰釋文賁賁亨小利有攸往賁文飾也離為日天文也艮為石地文也天文在下地文在上天地二文相飾成賁者也一云天地之文交相而成賁賁然也猶人君以剛柔仁義之道飾成其德也剛柔雜仁義合然後嘉會禮通故亨也卦㸦體坎艮艮止于上坎險止于下夾震在中故不利大行小有所之則可矣詩白駒正義集解賁變也文飾之貌釋文無敢折獄折斷也釋文初九賁其趾舍輿而徒釋文趾足同上義不乘也朝氏六四賁如燔如燔音煩釋文六四巽爻也有應於初九欲自飾以適初既進退未定故燔如也檀弓正義白馬翰如翰寒案反釋文謂九三位在辰得巽氣為白馬翰猶幹也見六四適初未定欲幹而有之檀弓正義剝不利有攸往小人長也陰氣侵陽上至于五萬物霝落故謂之剝也五陰一陽小人極盛君子不可有所之故不利有攸往也集解蔑貞凶蔑輕慢釋文剝牀以辨足上稱辨謂近膝之下屈則相近信則相逺故謂之辨辨分也集解切近災也切急也釋文小人剝廬小人傲很當剝徹廬舍而去天官遺人疏復復亨復反也還也陰氣侵陽陽失其位至此始還反起于初故謂之復陽君象君失國而還反道德更興也春秋正義七日來復建戌之月以陽氣既盡建亥之月純陰用事至建子之月陽氣始生隔此純陰一卦卦主六日七分舉其成數言之而云七日來復正義序商旅不行資貨而行曰商旅客也釋文無祗悔祗病也釋文六三顰復釋文六四中行獨復爻處五陰之中度中而行四獨應初漢上易傳中以自考也考成也釋文有災眚釋文異自內生曰眚自外曰祥害物曰災釋文無妄妄猶望謂無所希望也釋文無妄之往何之矣妄之言望人所望宜正行必有所望行而無所望是失其正何可往也後漢書李通傳注天命不右右助也釋文不災畬一嵗曰災二嵗曰新田三嵗曰畬王氏大畜不家食吉自九三至上九有頤象居外是不家食吉而養賢表記正義輝光日新絶句其德連下句剛上而尚賢釋文良馬逐逐逐逐兩馬走也釋文日間輿衛日人實反日習車徒釋文六四童牛之梏元吉朝氏謂梏鄭作角非也巽為木㸦體震震為牛之足足在艮體之中艮為手持木以就足是施梏大司冦疏六五豶豕之牙牙讀為㸦釋文上九何天之衢艮為手手上肩也乾為首首肩之間荷物處乾為天艮為徑路天衢象也後漢崔駰傳注道大行也人君在上位負荷天之大道文選十一頤頤貞吉觀頤自求口實頤口車輔之名也震動于下艮止于上口車動而上因輔嚼物以養人故謂之頤頤養也能行養則其幹事故吉矣二五離爻皆得中離為目觀象也觀頤觀其養賢與不肖也頤中有物曰口實自二至五有二坤坤載養物而人所食之物皆存焉觀其求可食之物則貪廉之情可别也集解觀我朵頤朵動也釋文大有慶也君以得人為慶漢上易傳大過陽爻過也漢上易傳九二枯楊生荑老夫得其女妻枯音姑謂無姑山榆羊朱反荑木更生音夷謂山榆之實釋文以丈夫年過娶二十之女老婦年過嫁三十之男皆得其子詩桃夭正義習坎六三檢且枕木在手曰檢在首曰枕釋文六四尊酒簋二用缶內約自牗六四上承九五又㸦體在震上爻辰在丑丑上值斗可以斟之象斗上有建星建星之形似簋二副也建星上有辨星辨星之形又如缶天子大臣以王命出會諸侯主國尊于簋副設玄酒而用缶也詩宛丘正義禮器正義九五祗既平祗當為坻小丘也釋文上六繫用徽纆置于叢棘三嵗不得凶繫拘也爻辰在已已為蛇蛇之蟠屈似徽纆也三五㸦體艮又與震同體艮為門闕于木為多節震之所為有叢拘之類門闕之內有叢木多節之木是天子外朝左右九棘之象也外朝者所以詢事之處也左嘉石平罷民焉右肺石達窮民焉罷民邪惡之民也上六乘陽有邪惡之罪故縳以一作約徽纆置于叢棘而使一作後公卿以下議之其害人者置之圜土而施職事焉以明刑恥之能復者上罪三年而赦中罪二年而赦下罪一年而赦不得者不自思以得正道終不自改而出諸圜土者殺故曰凶公羊疏離明兩作離大人以繼明照于四方作起也釋文明兩者取君明上下以明德相承其於天下之事無不見也文選注二十一初九履錯然錯七各反釋文六二黃離元吉離南方之卦離為火土託位焉土色黃火之子喻子有明德能附麗於其父之道文王之一作大子發旦一無此字是也慎成其業則吉矣文選注二十六御覽一百四十九三不擊缶而歌釋文艮爻也位近丑丑上值辨星辨星似缶詩云坎其擊缶則樂器亦有缶詩宛丘正義則大耋之差釋文云鄭無凶字年踰一作餘七十也詩車鄰正義雅禮記射義正義爾疏九四如其來如焚如死如棄如震為長子爻失正又㸦體兌兌為附決子居明法之家而無正何以自斷其君父不忍也如震之失正不知其所如又為巽巽為進退不知所從不孝之罪五刑莫大焉得用議貴之辟刑之若如所犯之罪焚如殺其親之刑死如殺人之刑棄如流宥之刑秋官掌戮疏麗王公也釋文增補鄭氏周易卷上
