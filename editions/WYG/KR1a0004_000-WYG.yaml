  text: 欽定四庫全書經部一
  hash: sha256:5111095677a17a819f758c15b1f1277a321ca96156d9a58f561e94ee59984d92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0004_WYG_000-1a, image: WYG0007/WYG0007-0147a.png}
body:
  text: 新本鄭氏周易易類提要臣等謹案新本鄭氏周易三卷國朝恵棟編棟字定宇長洲人初王應麟輯鄭元易註一卷其後人附刻玉海之末雖殘章斷句尚頗見漢學之崖畧於經籍頗為有功然皆不著所出之書又次序先後間與經文不應亦有遺漏未載者棟因其舊本重為補正凡應麟書所已載者一一考求原本註其出自某書明其信而有徴極為詳核其次序先後亦悉從經文釐定復搜採羣籍上經補二十八條下經補十六條繋辭𫝊補十四條説卦𫝊補二十二條序卦𫝊補七條雜卦𫝊補五條移應麟所附易贊一篇於卷端刪去所引諸經正義論互卦者八條而别據元周禮太師註作十二月爻辰圖據元月令註作爻辰所值二十八宿圖附於卷末以駁朱震漢上易𫝊之誤雖因人成事而考核精宻實勝原書應麟固鄭氏之功臣棟之是編亦可謂王氏之功臣矣乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鄭氏周易贊易之為名也一言而函三義簡易一也變易二也不易三也故繋辭云乾坤其易之緼耶又曰易之門户耶又曰夫乾確然示人易矣夫坤隤然示人簡矣易則易知簡則易從此言其易簡之法則也又曰其為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適此言從一作順時變易出入移動者也又曰天尊地卑乾坤定矣卑髙以陳貴賤位矣動静有常剛柔斷矣此言張設布列不易者也據兹三義而説易之道廣矣大矣
  hash: sha256:2e339272acb524396bd544b4731a38841a11c859bdf259194a965dcba4e8debc
