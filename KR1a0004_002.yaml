body:
  text: 增補鄭氏周易卷中宋王應麟輯長洲惠棟考補周易下經咸咸亨利貞取女吉咸感也艮為山兌為澤山氣下澤氣上二氣通而相應以生萬物故曰咸也其於人也嘉會禮通和順於義幹事能正三十之男有此三德以下二十之女正而相親說娶之則吉也集解二氣感應以相與與猶親也釋文初六咸其拇足大指也釋文六二咸其腓膊腸也膊市臠反釋文九五咸其脢脢背脊肉也釋文正義媵口說也媵送也釋文咸道極薄徒送口舌言語相感而已不復有志于其間正義恆恆亨無咎利貞恆久也巽為風震為雷雷風相須而養物猶長女承長男夫婦同心而成家久長之道也夫婦以嘉會禮通故無咎其能和順幹事所行而善矣集解初六濬恆釋文九三不恆其德咸承之羞釋文爻得正㸦體為乾乾有剛健之德體在巽巽為進退不恆其德之象又㸦體兌兌為毁折是將有羞辱也緇衣正義六五恆其德貞婦人吉夫子凶以隂爻而處尊位是天子之女又㸦體兌兌為和說至尊主家之女以和說幹家事問正於人故為吉也應在九二又男子之象體在巽巽為進退是無所定而婦言是從故云夫子凶也緇衣注正義上六振恆振搖落也釋文􅋟􅋟亨小利貞􅋟逃去之名也艮為門闕乾有健德㸦體有巽巽為進退君子出門行有進退逃去之象二五得位而有應是用正道得禮見召聘始仕他國當尚嗛嗛小其和順之道居小官幹小事其進以漸則逺妬忌之害昔陳敬仲奔齊辭卿是也集解有疾憊也憊困也釋文小人否備鄙反否塞也釋文大壯壯氣力浸强之名釋文九三纍其角釋文六五喪羊于易音亦謂佼易也釋文不祥也釋文祥善也同上晉晉康侯用錫馬蕃庶康尊也廣也釋文蕃發袁反庶止奢反謂蕃遮禽也同上晝日三接音捷接勝也王氏象曰明出地上晉君子以自照明德地雖生萬物日出於上其功乃著故君子法之而以明自照其德集解初六晉如摧如摧讀如南山崔崔之崔釋文六二晉如愁如愁子小反愁變色貌釋文九四晉如鼫鼠詩云鼫鼠鼫鼠無食我黍謂大鼠也正義六五矢得勿恤釋文明夷明夷利艱貞夷傷也日出地上其明乃光至其入地明則傷矣故謂之明夷日之明傷猶聖人君子有明德而遭亂世抑在下位則宜自艱無幹事政以避小人之害集解以蒙大難蒙猶遭也釋文文王似之釋文箕子似之釋文六二明夷睇于左股釋文旁視為睇六二辰在酉酉在一作是西方又下體離離為目九三體在震震東方九三又在辰辰得巽氣為股此謂六二有明德欲承九三故云睇于左股內則正義用拯馬拯承也釋文家人間有家間習也釋文六二無攸遂在中饋二為陰爻得正于內五陽爻也得正于外猶婦人自修正于內丈夫修正于外無攸遂言婦人無敢自遂也爻體離又㸦體坎火位在下水在上飪之象也饋酒食也故云在中饋也後漢書楊震𫝊注王符𫝊注家人嗃嗃嗃嗃苦熱之意釋文婦子嘻嘻嘻嘻驕佚喜笑之意釋文王假有家假登也釋文睽音圭釋文睽小事吉睽乖也火欲上澤欲下猶人同居而志異也故謂之睽二五相應君陰臣陽君而應臣故小事吉集解六三其牛㸷牛角皆踊曰㸷釋文後說之壺釋文蹇往得中也中和也釋文初六宜待時也釋文六四往蹇來連連如字連遲久之意釋文解天地解而雷雨作雷雨作而百果草木皆甲宅木實曰果解讀如人倦之解解謂坼呼呼火亞反皮曰甲根曰宅宅居也文選蜀都賦注損艮為山兌為澤㸦體坤坤為地山在地上澤在地下澤以自損增山之髙也猶諸侯損其國之富以貢獻于天子故謂之損矣集解二簋可用亨四以簋進黍稷于神也初與二直其四與五承上故用二簋四巽爻也巽為木五離爻也離為日日體圜木器而圜簋象也考工記旊人疏輿少牢饋食禮疏詩權正義君子以徵忿懫欲徵猶清也懫止也釋文或益之十朋之龜案爾雅云十朋之龜者一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜禮器正義正義益益利有攸往利涉大川陰陽之義陽稱為君陰稱為臣今震一陽二陰臣多於君矣而四體巽之不應初是天子損其所有以下諸侯也人君之道以益下為德故謂之益也震為雷巽為風雷動風行二者相成猶人君出教令臣奉行之故利有攸往利涉大川也集解夬夬揚于王庭夬決也陽氣浸長至于五五尊位也而陰先之是猶聖人積德說天下以漸消去小人至於受命為天子故謂之夬揚越也五㸦體乾乾為君又居尊位王庭之象也陰爻越其上小人乘君子罪惡上聞于聖人之朝故曰夬揚于王庭也集解九二惕號音號釋文莫夜莫如字同上莫無也無夜非一夜釋文九三壯于頯頯夾面也釋文其行趀趄趀七私反趄七餘反釋文九五莧陸莧陸一名商陸釋文正義遘釋文遘女壯勿用取女遘遇也一陰承五陽一女當五男茍相遇耳非禮之正故謂之遘女壯如是壯健似淫故不可娶婦人以婉娩為其德也集解后以施命詰四方詰起一反詰止也釋文以把包瓜包百交反把栁也釋文萃萃王假有廟釋文利見大人亨利貞用大牲吉利有攸往萃聚也坤為順兌為說臣下以順道承事其君說德居上待之上下相應有事而和通故曰萃亨也案釋文亨字疑衍假至也㸦有艮巽巽為木艮為闕木在闕上宫室之象也四本震爻震為長子五本坎爻坎為隱伏居尊而隱伏鬼神之象長子入闕升堂祭祖禰之禮也故曰王假有廟二本離爻也離為目居正應五故利見大人矣大牲牛也言大人有嘉會時可幹事必殺牛而盟既盟則可以往故曰利往集解君子以除戎器除去也釋文一握為笑握當讀為夫三為屋之屋釋文孚乃利用禴禴夏祭名釋文齎咨涕洟釋文齎咨嗟歎之辭也自目曰涕自鼻曰洟釋文升釋文升上也坤地巽木木生地中日長而上猶聖人在諸侯之中明德日益髙大也故謂之升升進益之象也集解六四王用亨于岐山亨許兩反亨獻也釋文困困亨坎為月㸦體離離為日兌為暗昧日所入也今上弇日月之明猶君子處亂伐為小人所不容故謂之困也君子雖困居儉能說是以通而無咎也集解九二困于酒食朱韍方來利用亨祀二據初辰在未未為土此二為大夫有地之象未上值天厨酒食象困于酒食者采地薄不足已用也二與日為體離為鎮霍爻四為諸侯有明德受命當王者離為火火色赤四爻辰在午時離氣赤為朱是也文王將王天子制用朱韍士冠禮疏朱深于赤王氏九五劓刖劓刖當為倪㐳釋文井坎水也巽木桔橰也㸦體離兌離外堅中虛瓶也兊為暗澤泉口也言桔橰引瓶下入泉口汲水而出井之象也井以汲人水無空竭猶君子以政教養天下惠澤無窮也集解井法也釋文汔至亦未繘井繘綆也釋文羸其瓶羸讀曰虆釋文九二井谷射鮒甕釋文敝漏九二坎爻也坎為水上直巽九三艮爻也艮為山山下有井必因谷水所生魚無大魚但多鮒魚耳言微小也夫感動天地此魚之至大射鮒井谷此魚之至小故以相況文選吳都賦注甕停水器也釋文井泄不食謂已浚泄也猶臣修正其身以事君也文選登樓賦注革革改也水火相息而更用事猶王者受命改正朔易服色故謂之革集解釋文鼎鼎象也卦有木火之用㸦體乾兌乾為金兌為澤澤鍾金而含水爨以木火鼎亨孰物之象鼎亨孰以養人猶聖君興仁義之道以教天下也故謂之鼎矣集解君子以正位凝命凝成也釋文初六鼎顛趾利出否得妾以其子無咎顛踣也趾足也無事曰趾陳設曰足爻體巽為股初爻在股之下足象也足所以承正鼎也初陰爻而柔與乾同體以否正承乾乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁于天子雖失禮無出道廢逺之而巳若其無子不廢逺之后尊如故其犯六出則廢之逺之子廢坤為順又為子母牛今在后妃之旁側妾之例也有順德子必賢賢而立以為世子又何咎也士昏禮疏內則正義十御覽一百四五我仇有疾怨耦曰仇釋文雉膏不食雉膏食之美者釋文九四鼎折足覆公餗其刑剭音屋釋文糝謂之餗震為竹竹萌日筍筍者餗之為菜也餗美饌是一作具八珍之食鼎三足三公象若三公傾覆王之美道屋中刑之天官醢人疏韓秋官司烜氏疏詩奕正義六五金鉉金鉉喻明道能舉君之官職也文選西征賦注唐律義疏震震亨震為雷雷動物之氣也雷之發聲猶人君出政教以動國中之人也故謂之震人君有善聲教則嘉會之禮通矣集解正詩召南義震來虩虩恐懼貌釋文笑言啞啞樂也釋文震驚百里不喪匕鬯驚之言驚戒也雷發聲聞于百里古者諸侯之象諸侯之出教令能驚戒其國疆之內詩召南正義則守其宗廟社稷為之祭主不亡其匕與鬯也人君於祭之禮尚一作匕牲體薦鬯而已其餘不親為也一云其餘不足觀也特牲饋食禮疏升牢於俎君匕之臣載之鬯秬酒芬芳條鬯因名焉集解億喪貝億於力反十萬曰億釋文六三震蘇蘇蘇蘇不安也釋文上六震索索視矍矍索索猶縮縮足不正也矍矍目不正釋文艮艮其背艮為山山立峙各於其所無相順之時猶君在上臣在下恩敬不相與通故謂之艮也集解艮之言很也釋文九三艮其限列其􅘡釋文限要也釋文漸初六鴻漸于干干謂大水之旁故停水處者詩伐檀正義文斯干正義釋夫征不復婦孕不育九三上與九五㸦體為離離為大腹孕之象也又㸦體為坎坎為丈夫坎為水水流而去是夫征不復也夫既不復則婦人之道顛覆故孕而不育郊特牲正義孕猶娠也釋文歸妹六三歸妹以須須有才智之稱天文有須女屈原之妹名女須詩桑扈正義女承筐無實宗廟之禮主婦奉筐米王氏士昏禮云婦入三月而後祭行詩葛屨正義豐豐之言倎充滿意也釋文日中則昃月盈則食言皆有休巳無常盛也公羊疏初九遇其妃主嘉耦曰妃釋文雖旬無咎初修禮上朝四四以匹敵恩厚待之雖留十日不為咎正以十日者朝聘之禮止于主國以為限聘禮畢歸大禮曰旬而稍旬之外為稍久留非常詩有客正義六二豐其菩菩小席釋文九三豐其韋一作芾韋祭祀之蔽膝釋文日中見昧釋文折其右肱三艮爻艮為手㸦體為巽巽又為進退手而便于進退右肱也猶大臣用事于君君能誅之故無咎儀禮覲禮疏闃其無人闃無人貌釋文天際祥也釋文際當為瘵瘵病也釋文自戕也戕傷也釋文旅初六旅瑣瑣斯其所取災瑣瑣猶小小也爻㸦體艮艮小石小小之象三為聘客初與二其介也介當以篤實之人為之而用小人瑣瑣然客主人為言不能辭曰非禮不能對曰非禮每者不能以禮行之則其所以得罪儀禮聘禮疏兌離澤兌離猶併也釋文九四商兌商隱度也釋文渙渙汗其大號號令也文選三節節以制度不傷財不害民空府藏則傷財力役繁則害民二者奢泰之所致後漢書王符𫝊注中孚中孚豚魚吉三辰在亥亥為豕爻失正故變而從小名言豚耳四辰在丑丑為鱉蟹鱉蟹魚之微者爻得正故變而從大名言魚耳㸦體㸦一作三兌兌為澤四上值天淵二五皆坎爻坎為水二浸澤則豚利五亦以水灌淵則魚利豚魚以喻小民也而為明君賢臣恩意所供養故吉詩無羊正義乘木舟虛也舟謂集板如今目空木大為之曰虛詩谷風正義小過小過亨利貞中孚為陽貞于十一月子小過為陰貞于六月未法于乾坤王氏不宜上上如字謂君也釋文密雲不雨已尚也釋文尚庶幾也釋文既濟既已也盡也濟度也釋文六二婦喪其茀茀車蔽也釋文憊也劣弱也釋文繻有衣袽繻音須釋文九五東鄰殺牛不如西鄰之禴祭㸦體為坎又㸦體為離離為日坎為月日出東方東鄰象月出西方西鄰象坊記正義禴夏祭之名王氏未濟小狐汔濟汔幾也釋文增補鄭氏周易卷中
