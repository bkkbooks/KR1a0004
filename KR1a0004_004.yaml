body:
  text: 周易乾鑿度曰乾陽也坤陰也並如而交錯行乾貞於十一月子左行陽時六鄭注云貞正也初爻以此為正次爻左右者各從次數之坤貞於六月未乾坤陰陽之主陰退一辰故貞於未右行陰時六以順成其嵗嵗終從於屯蒙嵗終則從其次屯蒙需訟是也又云陰卦與陽卦同位者退一辰以未為貞其爻右行間時而治六辰陰陽同位陰退一辰左右交錯相避棟案乾鑿度之説與十二律相生圖合鄭于周禮太師注云黃鍾初九也下生林鍾之初六林鍾又上生太蔟之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賔之九四蕤賔又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六韋昭注周語云十一月黃鍾乾初九也十二月大吕坤六四也正月太蔟乾九二也二月夾鍾坤六五也三月姑洗乾九三也四月中吕坤上六也五月蕤賔乾九四也六月林鍾坤初六也七月夷則乾九五也八月南吕坤六二也九月無射乾上九也十月應鍾坤六三也鄭氏注易陸績注太玄皆同前説是以何妥文言注以初九當十一月九二當正月九三當三月九四當五月九五當七月上九當九月也宋朱震作十二律圖六二在已六三在卯六五在亥上六在酉是坤貞于未而左行誤甚作圖以正之右圖朱子發云子寅辰午申戌陽也乾之六位未已卯丑亥酉此亦誤當云未酉亥丑卯已所謂右行陰時六也陰也坤之六位位之升降不違其時故曰大明終始六位時成棟案康成注月令云正月宿直尾箕八月宿直昴畢六月宿直鬼又云六月宿直東井九月宿直奎十月宿直營室又云卯宿直房心二月申宿直參伐七月又注季冬云此月之中日厯虛危參同契曰青龍處房六兮春花震東卯白虎在昴七兮秋芒兌西酉朱雀在張二兮離南午又云含元虛危播精於子皆與圖合若以日所厯言之則右行而周二十八舍明堂月令所謂孟春之月日在營室是也與此不同
