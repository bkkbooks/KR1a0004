body:
  text: 增補鄭氏周易卷下宋王應麟輯長洲惠棟考補繫辭上傳天尊地卑乾坤定矣卑髙已陳貴賤位矣君臣尊卑之貴賤如山澤之有髙卑也樂記正義動靜有常剛柔斷矣雷風也陽動陰靜剛柔之斷也同上公穀梁疏羊疏方以類聚物以羣分謂水火也同上在天成象日月星辰也同上在地成形謂草木鳥獸也同上十御覽三九八卦相蕩釋文乾以易知易音亦釋文三極之道也三極三才也釋文君子居則觀其象而玩其辭釋文震無咎者存乎悔震懼也釋文易與天地準準中也平也釋文原始及終釋文精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違精氣謂七八也遊魂謂九六也七八木火之數九六金水之數木火用事而物生故曰精氣為物金水用事而物變故曰遊魂為變精氣謂之神遊魂謂之鬼木火生物金水終物二物變化其情與天地相似故無所差違之也集解義樂記正而道濟天下道當作導釋文範圍天地之化範法也釋文故君子之道鮮矣鮮少也釋文臧諸用臧善也釋文言天下之至嘖而不可惡也惡烏落反釋文言天下之至嘖而不可亂也嘖當為動釋文樞機之發榮辱之主也樞户樞也機弩牙也户樞之發或明或暗弩牙之發或中或否以喻君子之言或榮或辱一云以譬言語之發有榮有辱傳禮記曲禮正義義左襄二十五年正慎斯術也術道釋文有功而不置置當為德一作志釋文君不密則失臣臣不密則失身幾事不密則害成幾微也密靜也言不慎于微而以動作則禍變必成公羊疏野容誨淫飾其容而見於外曰野言妖野容儀教誨淫泆釋文後漢崔駰傳注大衍之數五十其用四十有九天地之數五十有五以五行氣通凡五行減五大衍又減一故四十九也正義衍演也揲取也釋文天一生水于北地二生火于南天三生木于東地四生金于西天五生土于中陽無耦陰無配未得相成地六成水于北與天一并天七成火于南與地二并地八成木于東與天三并天九成金于西與地四并地十成土于中與天五并大衍之數五十有五五行各氣并氣并而減五惟有五十以五十之數不可以為七八九六卜筮之占以用之更減其一故四十有九也月令正義天數五地數五五位相得而各有合天地之氣各有五五行之次一曰水天數也二曰火地數也三曰木天數也四曰金地數也五曰土天數也此五者陰無匹陽無耦故又合之地六為天一匹也天七為地二耦也地八為天三匹也天九為地四耦也地十為天五匹也二五陰陽各有合然後氣相得施化行也春秋正義以制器者尚其象此者存于器象可得而用一切器物及造立皆是春官太卜疏聖人之所以極深而研機也機當作幾幾微也釋文蓍之德圓而神蓍形圓而可以立變化之數故謂之神也少牢饋食禮疏神武而不殺者夫殺所戒反釋文易有太極極中之道淳和未分之氣也文選十九兩儀生四象布六于北方以象水布八于東方以象木布九于西方以象金布七于南方以象火王氏定天下之吉凶成天下之亹亹者莫善乎蓍龜凡天下之善惡及沒沒之衆事皆成定之言其廣大無不包也公羊疏河出圖洛出書聖人則之春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書成河圖有九篇洛書有六篇也集解有以尚賢也釋文繫辭下傳古者包犧氏之王天下也包取一作聚也鳥獸全具曰犧釋文黃帝堯舜垂衣裳始去羽毛公羊疏金天氏髙陽髙辛遵黃帝之道無所改作春官大司樂疏蓋取諸乾坤乾為天其色玄坤為地其色黃王制正義重門擊柝以待暴客釋文豫坤下震上九四體震又㸦體有艮艮為門震日所出亦為門重門象艮又為手巽爻也應在四皆木也手持二木也手持二木以相敲是為擊柝擊柝為守備驚戒也四又㸦體為坎坎為盜五離爻為甲胄戈兵盜甲胄持戈兵是暴客也又以其卦為豫有守備則不可自佚天官宫正疏後世聖人易之以棺椁蓋取諸大過大過者巽下兌上之卦初六在巽體巽為木上六位在巳已當巽位巽又為木二木在外以夾四陽四陽㸦體為二乾乾為君為父二木夾君父一作是棺椁之象檀弓正義上古結繩而治結繩為約事大大結其繩事小小結其繩正義後世聖人易之以書契書之于木刻其側為契各持其一後以相考合書正義陽一君而二民君子之道也陰二君而一民小人之道也一君二民謂黃帝堯舜謂地方萬里為方千里者百中國之民居七千里七七四十九方千里者四十九四裔之民居千里者五十一是中國四裔二民共事一君二君一民謂三代之末以地方五千里一君有五千里之土五五二十五更足以一君二十五始滿千里之方五十乃當堯舜一民之地故云二君一民王制正義君子知微知章知微謂幽昧知章謂明顯也文選西征賦注男女覯精覯合也男女以陰陽合其精氣詩草蟲正義因二以濟民行二當為二釋文損德之修也修治也釋文困德之辨也辨别也遭困之時君子固窮小人窮則濫德于是别也集解益長裕而不設設大也周禮考工曰中其莖設其後考工桃氏疏若夫雜物算德算數也釋文則居可知矣居音基辭也知者觀其彖辭彖辭爻辭也釋文當文王與紂之事耶據此言以易文王所作斷可知矣左傳昭二年正義成天下之亹亹者亹亹沒沒也釋文人謀鬼謀鬼謀謂謀卜筮於廟門是也士冠禮疏愛惡相攻惡烏落反釋文説卦傳昔者聖人之作易也謂伏犧文王也尚書孔序正義參天兩地而倚數天地之數備於十乃三之以天兩之以地而倚託大演之數五十也必三之以天兩之以地者天三覆地二載必極於數庶幾得吉凶之審也正義發揮于剛柔揮揚也釋文窮理盡性以至于命言窮其義理盡其人之情性以至于命吉凶所定文選注六十兼三才而兩之故易六畫而成卦三才天地人之道六畫畫六爻士冠禮疏雷風相薄薄入也釋文萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所説也故曰説言乎兌戰于乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮萬物出於震雷發聲以生之也齊於巽相見於離風搖動以齊之也潔猶新也萬物皆相見日照之使光大萬物皆致養焉地氣含養使有秀實也萬物之所説草木皆老猶以澤氣説成之戰言陰陽相薄西北陰也而乾以純陽臨之猶君臣對合也坎勞卦也水性勞而不倦萬物之所歸也萬物自春出生於地冬氣閉藏還皆入地萬物之所成終而所成始言萬物陰氣終陽氣始皆艮之用事也漢上易九卷周易折中神也者眇萬物而為言者也共成萬物物不可得而分故合謂之神漢上易莫盛乎艮盛音成盛裹也釋文故水火相逮釋文兌為羊其畜好剛鹵夏官羊人序官疏兌為口上開似口漢上易乾為天天清明無形漢上易為瘠馬凡骨為陽肉為陰同上為龍龍讀為尨取日出時色雜也漢上易為専専市戀反釋文為大塗國中三道曰塗震上值房心塗而大者取房有三塗焉漢上易為􅍉葦竹類漢上易為反生生而反出也漢上易為繩直為墨朝氏云其於人也為宣髮宣髮取四月靡草死髮在人體猶靡草在地考工車人疏為黃顙釋文為矯輮釋文為月臣象也文選月賦注為電取火明也久明似日暫明似電也集解為乾卦乾當為幹董遇本作幹陽在外能幹正也釋文為鱉為蟹為螺為蚌為龜皆骨在外考工梓人疏為科上藁科上者陰在內為疾漢上易為徑路田間之道曰徑路艮為之者取山間鹿兔之蹊初學記二十四為小指朝氏云為黚喙之屬謂虎豹之屬貪冒之類取其為山獸漢上易釋文為陽今本羊此陽謂為養無家女行賃炊爨今時有之賤于妾也漢上易朝氏同序卦傳物生必蒙故受之以蒙蒙者蒙也物之稚也蒙幼小之貌齊人謂萌為蒙也集解物稚不可不養也言孩稚不養則不長也集解飲食必有訟故受之以訟訟猶爭一作諍也言飲食之會恆多爭也集解履然後安故受之以泰朝氏云有大有不可以盈朝氏云有大而能嗛必豫故受之以豫言同既大而有嗛德則於政事恬豫雷出地奮豫豫行出而喜樂之意集解豫必有隨喜樂而出人則隨從孟子曰吾君不遊吾何以休吾君不豫吾何以助此之謂也正義可觀而後有所合易乾鑿度曰陽起於子陰起於午天數大分以陽出離以陰入坎坎為中男離為中女太乙之行出從中男入從中女因陰陽男女之偶為終始也王氏致飾然後亨則盡矣亨許兩反釋文有無妄物然後可畜項安世周易玩辭朝氏同故受之以大過以養賢者宜過于厚正義夫婦之道不可以不久也言夫婦當有終身之義夫婦之道謂咸恆也集解物不可以終久於其所故受之以遁朝氏云主器者莫若長子謂父退居田里不能備祭宗廟長子當親視滌濯鼎俎是也曲禮正義雜卦傳屯見而不失其居見如字釋文損益衰盛之始也釋文釋引見會通今文無之兌説而巽伏也朝氏云蠱則飾也釋文大過顛也自此以下卦音不協似錯亂失正弗敢改耳朝氏云小人道消也朝氏云增補鄭氏周易卷下
